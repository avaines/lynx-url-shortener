name: Deploy Lynx

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.13"
  TERRAFORM_VERSION: "1.14.3"
  TF_IN_AUTOMATION: "true"

jobs:
  deploy-dev:
    name: Deploy dev
    if: >-
      ${{
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository ||
        github.event_name == 'workflow_dispatch' &&
        inputs.environment == 'dev'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: dev
    concurrency:
      group: lynx-dev
      cancel-in-progress: true
    env:
      TF_DIR: infrastructure/terraform/environments/dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install UV
        run: python -m pip install uv

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: portal/package-lock.json

      - name: Install portal dependencies
        run: npm ci
        working-directory: portal

      - name: Test Lambda functions
        run: make test
        working-directory: infrastructure/lambdas

      - name: Lint Lambda functions
        run: make lint
        working-directory: infrastructure/lambdas

      - name: Check lint did not rewrite files
        run: git diff --exit-code

      - name: Lint portal
        run: npm run lint
        working-directory: portal

      - name: Test portal
        run: npm run test
        working-directory: portal

      - name: Build portal
        run: npm run build
        working-directory: portal

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive infrastructure/terraform

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: lynx-${{ github.run_id }}

      - name: Initialise Terraform
        run: terraform -chdir="${TF_DIR}" init -input=false -no-color

      - name: Validate Terraform
        run: terraform -chdir="${TF_DIR}" validate -no-color

      - name: Apply Terraform
        run: terraform -chdir="${TF_DIR}" apply -input=false -auto-approve -no-color

      - name: Upload portal
        run: |
          portal_bucket="$(terraform -chdir="${TF_DIR}" output -raw portal_bucket)"
          aws s3 sync portal/dist/ "s3://${portal_bucket}/" --delete

      - name: Invalidate CloudFront
        run: |
          distribution_id="$(terraform -chdir="${TF_DIR}" output -raw cloudfront_distribution_id)"
          aws cloudfront create-invalidation --distribution-id "${distribution_id}" --paths "/*"

  deploy-prod:
    name: Deploy prod
    if: >-
      ${{
        github.event_name == 'push' ||
        github.event_name == 'workflow_dispatch' &&
        inputs.environment == 'prod'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: prod
    concurrency:
      group: lynx-prod
      cancel-in-progress: false
    env:
      TF_DIR: infrastructure/terraform/environments/prod
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install UV
        run: python -m pip install uv

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: portal/package-lock.json

      - name: Install portal dependencies
        run: npm ci
        working-directory: portal

      - name: Test Lambda functions
        run: make test
        working-directory: infrastructure/lambdas

      - name: Lint Lambda functions
        run: make lint
        working-directory: infrastructure/lambdas

      - name: Check lint did not rewrite files
        run: git diff --exit-code

      - name: Lint portal
        run: npm run lint
        working-directory: portal

      - name: Test portal
        run: npm run test
        working-directory: portal

      - name: Build portal
        run: npm run build
        working-directory: portal

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive infrastructure/terraform

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: lynx-prod-${{ github.run_id }}

      - name: Initialise Terraform
        run: terraform -chdir="${TF_DIR}" init -input=false -no-color

      - name: Validate Terraform
        run: terraform -chdir="${TF_DIR}" validate -no-color

      - name: Apply Terraform
        run: terraform -chdir="${TF_DIR}" apply -input=false -auto-approve -no-color

      - name: Upload portal
        run: |
          portal_bucket="$(terraform -chdir="${TF_DIR}" output -raw portal_bucket)"
          aws s3 sync portal/dist/ "s3://${portal_bucket}/" --delete

      - name: Invalidate CloudFront
        run: |
          distribution_id="$(terraform -chdir="${TF_DIR}" output -raw cloudfront_distribution_id)"
          aws cloudfront create-invalidation --distribution-id "${distribution_id}" --paths "/*"
